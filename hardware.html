<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardware Projects — Moussa Hamzi</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #111110;
    --surface: #191918;
    --white: #e8e6e1;
    --warm: #d4cfc6;
    --gray: #706d66;
    --gray-dark: #3d3b38;
    --accent: #6aacbf;
    --serif: 'Montserrat', sans-serif;
    --mono: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: var(--mono);
    -webkit-font-smoothing: antialiased;
  }

  /* NAV */
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 1rem 2.5rem;
    background: rgba(17, 17, 16, 0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--gray-dark);
  }

  .nav-left {
    display: flex;
    gap: 1.8rem;
  }

  .nav-left a {
    font-size: 0.7rem;
    color: var(--gray);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    transition: color 0.2s;
  }

  .nav-left a:hover { color: var(--white); }

  .logo {
    font-family: var(--serif);
    font-size: 0.95rem;
    text-align: center;
    letter-spacing: 0.08em;
  }

  .logo a {
    color: inherit;
    text-decoration: none;
  }

  .nav-right {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 1.5rem;
  }

  .nav-li {
    display: inline-flex;
    align-items: center;
    text-decoration: none;
    padding: 0.3rem;
    transition: opacity 0.2s;
  }

  .nav-li:hover { opacity: 0.7; }
  .nav-li svg { width: 20px; height: 20px; fill: var(--accent); }

  /* PAGE HEADER */
  .page-header {
    padding: 8rem 2.5rem 3rem;
    max-width: 900px;
    margin: 0 auto;
    text-align: center;
  }

  .page-eyebrow {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: var(--accent);
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
  }

  .page-eyebrow::before, .page-eyebrow::after {
    content: '';
    width: 30px;
    height: 1px;
    background: var(--gray-dark);
  }

  .page-header h1 {
    font-family: var(--serif);
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 400;
    letter-spacing: -0.01em;
  }

  .page-header h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .page-header p {
    margin-top: 1.5rem;
    font-size: 0.78rem;
    color: var(--gray);
    line-height: 1.8;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }

  /* CONTENT */
  .content {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 2.5rem 6rem;
  }

  /* Section block */
  .c-section {
    margin-bottom: 3rem;
  }

  .c-section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--gray-dark);
    margin-bottom: 0;
  }

  .c-section-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--accent);
  }

  .c-section-count {
    font-size: 0.62rem;
    color: var(--gray);
    letter-spacing: 0.1em;
  }

  /* Project entry */
  .project {
    padding: 1.8rem 0;
    border-bottom: 1px solid var(--gray-dark);
  }

  .project-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.5rem;
    gap: 1rem;
  }

  .project-title {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 400;
  }

  .project-date {
    font-size: 0.62rem;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  .project-status {
    display: inline-block;
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    border: 1px solid rgba(106, 172, 191, 0.3);
    background: rgba(106, 172, 191, 0.06);
    padding: 0.2rem 0.5rem;
    margin-bottom: 0.6rem;
  }

  .project-desc {
    font-size: 0.78rem;
    color: var(--warm);
    line-height: 1.8;
    margin-bottom: 0.8rem;
  }

  .project-bullets {
    list-style: none;
  }

  .project-bullets li {
    font-size: 0.75rem;
    color: var(--warm);
    line-height: 1.7;
    padding-left: 1.2rem;
    position: relative;
  }

  .project-bullets li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0.55em;
    width: 4px;
    height: 4px;
    border: 1px solid var(--gray-dark);
    border-radius: 50%;
  }

  .project-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 1rem;
  }

  .project-tag {
    font-size: 0.6rem;
    color: var(--gray);
    border: 1px solid var(--gray-dark);
    padding: 0.25rem 0.55rem;
  }

  .project-img {
    width: 100%;
    border: 1px solid var(--gray-dark);
    margin-top: 1.2rem;
    display: block;
  }

  .project-images {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
    margin-top: 1.2rem;
  }

  .project-images img {
    width: 100%;
    border: 1px solid var(--gray-dark);
    display: block;
  }

  @media (max-width: 768px) {
    .project-images { grid-template-columns: 1fr; }
  }
  .coming-soon {
    padding: 3rem 0;
    border-bottom: 1px solid var(--gray-dark);
    text-align: center;
  }

  .coming-soon span {
    font-size: 0.72rem;
    color: var(--gray);
    font-style: italic;
    font-family: var(--serif);
  }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--gray-dark);
    padding: 2rem 2.5rem;
    display: flex;
    justify-content: space-between;
    font-size: 0.6rem;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    header { grid-template-columns: 1fr auto; padding: 1rem 1.2rem; }
    .nav-left { display: none; }
    .logo { text-align: left; }
    .page-header { padding: 7rem 1.2rem 2rem; }
    .content { padding: 0 1.2rem 4rem; }
    .project-top { flex-direction: column; gap: 0.3rem; }
    footer { padding: 1.5rem 1.2rem; }
  }
</style>
</head>
